name: "Setup and install"
description: "Node (from .nvmrc) + pnpm (version from package.json#packageManager) + cached install"

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: ".nvmrc"
        package-manager-cache: false

    - name: Install pnpm (version from package.json#packageManager)
      shell: bash
      run: |
        set -euo pipefail
        PM=$(node -p "require('./package.json').packageManager || ''")
        if [[ -z "$PM" || "$PM" != pnpm@* ]]; then
          echo "::error::package.json#packageManager must be set to pnpm@<version> (got: '$PM')"
          exit 1
        fi
        echo "Installing $PM"
        npm install -g "$PM"
        INSTALLED=$(pnpm --version)
        EXPECTED="${PM#pnpm@}"
        if [[ "$INSTALLED" != "$EXPECTED" ]]; then
          echo "::error::pnpm version mismatch: expected '$EXPECTED', got '$INSTALLED'"
          exit 1
        fi
        echo "pnpm $INSTALLED ready"

    - name: Resolve pnpm store path
      id: pnpm-store
      shell: bash
      run: |
        set -euo pipefail
        STORE_PATH=$(pnpm store path --silent)
        if [[ -z "$STORE_PATH" ]]; then
          echo "::error::Failed to resolve pnpm store path"
          exit 1
        fi
        echo "path=$STORE_PATH" >> "$GITHUB_OUTPUT"
        echo "pnpm store: $STORE_PATH"

    - name: Cache pnpm store
      uses: actions/cache@v5
      with:
        path: ${{ steps.pnpm-store.outputs.path }}
        key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-

    - name: Install dependencies
      shell: bash
      run: |
        set -euo pipefail
        if [[ ! -f pnpm-lock.yaml ]]; then
          echo "::error::pnpm-lock.yaml not found at repo root"
          exit 1
        fi
        pnpm install --frozen-lockfile

