name: General Packages CI

# This workflow intentionally uses workflow-level path filters. Do not configure
# it as a required branch-protection check unless skipped required workflows are
# acceptable for this repository, or replace it with an always-report wrapper.
on:
  pull_request:
    branches: ["**"]
    paths:
      - "packages/files/**"
      - "packages/ui/**"
      - "packages/i18n/**"
      - "tooling/**"
      - "turbo/**"
      - "scripts/check-package-scripts.mjs"
      - "docs/README.md"
      - "docs/architecture/**"
      - "docs/flows/**"
      - "docs/setup/files-platform-examples.md"
      - "docs/setup/files-status-migration.md"
      - "docs/setup/ui-domains-migration.md"
      - ".github/workflows/general-packages-ci.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
  push:
    branches: ["main"]
    paths:
      - "packages/files/**"
      - "packages/ui/**"
      - "packages/i18n/**"
      - "tooling/**"
      - "turbo/**"
      - "scripts/check-package-scripts.mjs"
      - "docs/README.md"
      - "docs/architecture/**"
      - "docs/flows/**"
      - "docs/setup/files-platform-examples.md"
      - "docs/setup/files-status-migration.md"
      - "docs/setup/ui-domains-migration.md"
      - ".github/workflows/general-packages-ci.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
  merge_group:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  FORCE_COLOR: 3
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  TURBO_TEAM: ${{ vars.TURBO_TEAM || '' }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN || '' }}

jobs:
  reusable-packages:
    name: Reusable Packages
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Setup
        uses: ./tooling/github/setup

      - name: Package script convention
        run: pnpm lint:workspace-package-scripts

      - name: Format and lint reusable packages
        run: pnpm turbo run format-and-lint:check --filter="./packages/files/**" --filter="./packages/i18n/**" --filter="./packages/ui/**" --continue

      - name: Typecheck reusable packages
        run: pnpm turbo run type:check --filter="./packages/files/**" --filter="./packages/i18n/**" --filter="./packages/ui/**" --continue

      - name: Test reusable packages
        run: pnpm turbo run test --filter="./packages/files/**" --filter="./packages/i18n/**" --filter="./packages/ui/**" --continue
