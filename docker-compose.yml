services:
  proto-cook-postgres:
    image: postgres:16-alpine
    container_name: de100-proto-cook-postgres
    environment:
      POSTGRES_DB: de100_proto_cook
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d de100_proto_cook"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    restart: unless-stopped
    volumes:
      - proto-cook-postgres-data:/var/lib/postgresql/data

  proto-cook-redis:
    image: redis:7-alpine
    container_name: de100-proto-cook-redis
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "6379:6379"
    restart: unless-stopped
    volumes:
      - proto-cook-redis-data:/data

  proto-cook-minio:
    image: minio/minio:latest
    container_name: de100-proto-cook-minio
    command: server /data --address ":9000" --console-address ":9001"
    environment:
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_ROOT_USER: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped
    volumes:
      - proto-cook-minio-data:/data

volumes:
  proto-cook-minio-data:
  proto-cook-postgres-data:
  proto-cook-redis-data:
